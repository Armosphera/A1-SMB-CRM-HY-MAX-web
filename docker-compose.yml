# docker-compose for the Integrations settings UI.
#
# This is what the Linux VM runs. It expects the Fastify backend
# (A1-SMB-CRM-HY-MAX) to be running somewhere reachable on the
# same Docker network, usually under the service name `backend`.
#
# To wire up backend discovery, set BACKEND_URL in `.env` or in
# your deploy environment. The default points at the
# `a1-smb-crm-hy-max-backend` service in the same compose project.
#
# Vite's built-in proxy is NOT available in the TanStack Start
# runtime; the backend proxy here is implemented as a TanStack
# server route at src/routes/api/$.ts. The compose-level reverse
# proxy (nginx, caddy) can be added in front if you need TLS
# termination and a single host for the two services.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: a1-smb-crm-hy-max-web:latest
    container_name: a1-smb-crm-hy-max-web
    restart: unless-stopped
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=production
      - PORT=4173
      # Override at the deploy level. This is the backend the
      # server-side API route forwards /v1/* to.
      - BACKEND_URL=http://backend:4100
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4173/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - a1-net

  # Reference service definition for the Fastify backend. Uncomment
  # in your deploy compose if you want a single stack instead of
  # two.
  #
  # backend:
  #   image: a1-smb-crm-hy-max-backend:latest
  #   container_name: a1-smb-crm-hy-max-backend
  #   restart: unless-stopped
  #   ports:
  #     - "4100:4100"
  #   environment:
  #     - NODE_ENV=production
  #     - DATABASE_URL=postgresql://...
  #     - REDIS_URL=redis://...
  #     - JWT_SECRET=...
  #     - INTEGRATION_KEK=...
  #   networks:
  #     - a1-net

networks:
  a1-net:
    driver: bridge
